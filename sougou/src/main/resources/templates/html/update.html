<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<link rel="stylesheet" th:href="@{/css/common.css}">
		<title>更新</title>
	</head>
	<body>
		<div id="wapper">
			<div class="menu">
				<a th:href="@{/}">メニュー</a><br>
				<a th:href="@{/list}">メンバ一覧</a><br>
			</div>
			<div class="menu">
				<h2>更新画面</h2>
				<p>以下のデータの更新を行います</p>
			</div>
			<form th:action="@{/updateConf}" method="post" th:object="${member}">
				<table class="ct">
					<tr>
						<th>&nbsp;</th>
						<th>&nbsp;</th>
					</tr>
					<tr>
						<th>社員ID</th>
						<td>
							<input type="text" th:field="*{memberId}">
							<div class="error" th:errors="*{memberId}"></div>
						</td>
					</tr>
					<tr>
						<th>氏名</th>
						<td>
							<input type="text" th:field="*{name}">
							<div class="error" th:errors="*{name}"></div>
						</td>
					</tr>
					<tr>
						<th>年齢</th>
						<td>
							<input type="text" th:field="*{age}">
							<div class="error" th:errors="*{age}"></div>
						</td>
					</tr>
					<tr>
						<th>性別</th>
						<td>
							男<input type="radio" th:field="*{sex}" value="0">
							女<input type="radio" th:field="*{sex}" value="1">
							<div class="error" th:errors="*{sex}"></div>
						</td>
					</tr>
					<tr>
						<th>住所</th>
						<td>
							<input type="text" th:field="*{address}">
							<div class="error" th:errors="*{address}"></div>
						</td>
					</tr>
					<tr>
						<th>電話番号</th>
						<td>
							<input type="text" th:field="*{tel}">
							<div class="error" th:errors="*{tel}"></div>
						</td>
					</tr>
					<tr>
						<th>メールアドレス</th>
						<td>
							<input type="text" th:field="*{mail}">
							<div class="error" th:errors="*{mail}"></div>
						</td>
					</tr>
					<tr>
						<th>役職</th>
						<td>
							<select th:field="*{positionId}">
								<option th:each="position : ${positions}"
									th:value="${position.positionId}"
									th:text="${position.positionName}">
								</option>
							</select>
						</td>
					</tr>
					<tr>
						<th>事業所</th>
						<td>
							<select th:field="*{placeId}">
								<option th:each="place : ${places}"
									th:value="${place.placeId}"
									th:text="${place.placeName}">
								</option>
							</select>
						</td>
					</tr>
				</table>
				<input type="hidden" th:field="*{regist}">
				<input type="hidden" th:field="*{deleteFlg}">
				<div class="menu">
					<input type="submit" value="更新">
					&nbsp;&nbsp;&nbsp;&nbsp;
					<input type="submit"
						th:formaction="@{/list}"
						formmethod="get"
						value="戻る">
				</div>
			</form>
		</div>
	</body>
</html>
