<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<link rel="stylesheet" type="text/css" th:href="@{/css/common.css}">
		<title>新規登録</title>
	</head>

	<body>
		<div id="wapper">
			<div class="menu">
				<a th:href="@{/}">メニュー</a><br>
			</div>
			<div class="menu">
				<h2>新規登録&nbsp;確認画面</h2>
				<p>以下のデータを登録します&nbsp;よろしいですか</p>
			</div>
			<form th:action="@{/insertComp}" method="post" th:object="${member}">
				<table class="ct">
					<tr>
						<th>社員ID</th>
						<td th:text="*{memberId}"></td>
					</tr>
					<tr>
						<th>氏名</th>
						<td th:text="*{name}"></td>
					</tr>
					<tr>
						<th>年齢</th>
						<td th:text="*{age}"></td>
					</tr>
					<tr>
						<th>性別</th>
						<td th:text="*{sex == 0 ? '男' : '女'}"></td>
					</tr>
					<tr>
						<th>住所</th>
						<td th:text="*{address}"></td>
					</tr>
					<tr>
						<th>電話番号</th>
						<td th:text="*{tel}"></td>
					</tr>
					<tr>
						<th>メールアドレス</th>
						<td th:text="*{mail}"></td>
					</tr>
					<tr>
						<th>役職</th>
						<td th:text="${positionMap[member.positionId]}"></td>
					</tr>
					<tr>
						<th>事業所</th>
						<td th:text="${placeMap[member.placeId]}"></td>
					</tr>
				</table>
				<input type="hidden" th:field="*{memberId}">
				<input type="hidden" th:field="*{name}">
				<input type="hidden" th:field="*{age}">
				<input type="hidden" th:field="*{sex}">
				<input type="hidden" th:field="*{address}">
				<input type="hidden" th:field="*{tel}">
				<input type="hidden" th:field="*{mail}">
				<input type="hidden" th:field="*{positionId}">
				<input type="hidden" th:field="*{placeId}">
				<div class="menu">
					<input type="submit" value="登録">
					&nbsp;&nbsp;&nbsp;&nbsp;
					<a th:href="@{/insert}">戻る</a>
				</div>
			</form>
		</div>
	</body>
</html>
