<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<link rel="stylesheet" th:href="@{/css/common.css}">
		<title>更新</title>
	</head>
	<body>
		<div id="wapper">
			<div class="menu">
				<a th:href="@{/}">メニュー</a><br>
				<a th:href="@{/list}">メンバ一覧</a><br>
			</div>
			<div class="menu">
				<h2>更新確認画面</h2>
				<p>以下のデータに更新を行います&nbsp;よろしいですか</p>
			</div>
			<form th:action="@{/updateComp}" method="post" th:object="${member}">
				<table class="ct">
					<tr>
						<th>&nbsp;</th>
						<th>更新後</th>
					</tr>
					<tr>
						<th>社員ID</th>
						<td th:text="*{memberId}"></td>
					</tr>
					<tr>
						<th>氏名</th>
						<td th:text="*{name}"></td>
					</tr>
					<tr>
						<th>年齢</th>
						<td th:text="*{age}"></td>
					</tr>
					<tr>
						<th>性別</th>
						<td th:text="*{sex == 0 ? '男' : '女'}"></td>
					</tr>
					<tr>
						<th>住所</th>
						<td th:text="*{address}"></td>
					</tr>
					<tr>
						<th>電話番号</th>
						<td th:text="*{tel}"></td>
					</tr>
					<tr>
						<th>メールアドレス</th>
						<td th:text="*{mail}"></td>
					</tr>
					<tr>
						<th>役職</th>
						<td th:text="*{position.positionName}"></td>
					</tr>
					<tr>
						<th>事業所</th>
						<td th:text="*{place.placeName}"></td>
					</tr>
				</table>
				<input type="hidden" th:field="*{memberId}">
				<input type="hidden" th:field="*{name}">
				<input type="hidden" th:field="*{age}">
				<input type="hidden" th:field="*{sex}">
				<input type="hidden" th:field="*{address}">
				<input type="hidden" th:field="*{tel}">
				<input type="hidden" th:field="*{mail}">
				<input type="hidden" th:field="*{positionId}">
				<input type="hidden" th:field="*{placeId}">
				<input type="hidden" th:field="*{regist}">
				<input type="hidden" th:field="*{deleteFlg}">
				<div class="menu">
					<input type="submit" value="更新">
					&nbsp;&nbsp;&nbsp;&nbsp;
					<input type="submit" th:formaction="@{/update}" value="戻る">
				</div>
			</form>
		</div>
	</body>
</html>
