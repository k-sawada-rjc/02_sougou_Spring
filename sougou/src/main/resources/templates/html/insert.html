<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<link rel="stylesheet" type="text/css" th:href="@{/css/common.css}">
		<title>新規登録</title>
	</head>
	<body>
		<div id="wapper">
			<div class="menu">
				<a th:href="@{/}">メニュー</a><br>
			</div>
			<div class="menu">
				<h2>新規登録画面</h2>
			</div>
			<form th:action="@{/insertConf}"  accept-charset="utf-8" method="post" th:object="${member}">
				<table class="ct">
					<tr>
						<th>社員ID</th>
						<td><input type="text" th:field="*{memberId}">
						<div class="error" th:errors="*{memberId}"></div></td>
					</tr>
					<tr>
						<th>氏名</th>
						<td><input type="text" th:field="*{name}">
						<div class="error" th:errors="*{name}"></div></td>
					</tr>
					<tr>
						<th>年齢</th>
						<td><input type="text" th:field="*{age}">
						<div class="error" th:errors="*{age}"></div></td>
					</tr>
					<tr>
						<th>性別</th>
						<td>
							男<input type="radio" th:field="*{sex}" value="0">
							女<input type="radio" th:field="*{sex}" value="1">
							<div class="error" th:errors="*{sex}"></div>
						</td>
					</tr>
					<tr>
						<th>住所</th>
						<td><input type="text" th:field="*{address}">
						<div class="error" th:errors="*{address}"></div></td>
					</tr>
					<tr>
						<th>電話番号</th>
						<td><input type="text" th:field="*{tel}" >
						<div class="error" th:errors="*{tel}"></div></td>
					</tr>
					<tr>
						<th>メールアドレス</th>
						<td><input type="text" th:field="*{mail}">
						<div class="error" th:errors="*{mail}"></div></td>
					</tr>
					<tr>
						<th>役職</th>
						<td>
							<select th:field="*{positionId}">
								<option th:each="position : ${positions}" th:value="${position.positionId}"
								th:text="${position.positionName}"></option>
							</select>
						</td>
					</tr>
					<tr>
						<th>事業所</th>
						<td>
							<select th:field="*{placeId}">
								<option th:each="place :${places}" th:value="${place.placeId}"
								th:text="${place.placeName}"></option>
							</select>
						</td>
					</tr>
				</table>
				<div class="menu">
					<input type="submit" value="登録">
				</div>
			</form>
		</div>
	</body>
</html>
